<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Dashboard – TrimURL</title>
  <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div id="toast-container"></div>
<header>
  <div class="logo">
    <span class="logo-icon">🔗</span>
    <span class="logo-text"><span class="bold">TRIM</span><span class="light">URL</span></span>
  </div>
  <nav>
    <a href="/home">Home</a>
    <a href="/dashboard" class="active">Dashboard</a>
    <a href="/test">Test</a>
    <form th:action="@{/logout}" method="post" style="display:inline;">
      <button type="submit" class="btn-logout">Logout</button>
    </form>
  </nav>
</header>
<main>
  <div class="container">
    <div class="page-title">Your <span>Dashboard</span></div>

    <!-- FIX 4: Nearing-expiry banners (rendered server-side for each link) -->
    <div th:each="url : ${urls}" th:if="${url.nearingExpiry and !url.disabled}"
         class="alert warning" style="margin-bottom:0.7rem;display:flex;align-items:center;gap:0.5rem;">
      ⏰ <strong th:text="${url.shortUrl}">link</strong>&nbsp;expires in less than 1 hour!
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">🔗</div>
        <div class="stat-info">
          <div class="stat-value" th:text="${totalUrls}">0</div>
          <div class="stat-label">Total Links</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📈</div>
        <div class="stat-info">
          <div class="stat-value" th:text="${totalClicks}">0</div>
          <div class="stat-label">Total Clicks</div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>All Your Links</h2>
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>Short URL</th><th>Original URL</th><th>Clicks</th>
              <th>Created</th><th>Expires</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="url : ${urls}">
              <td><a th:href="@{'/r/'+${url.shortCode}}" th:text="${url.shortUrl}" target="_blank"></a></td>
              <td class="truncate" th:text="${url.originalUrl}"></td>
              <td th:text="${url.clickCount}">0</td>
              <td class="time-cell created-time" th:attr="data-ts=${url.createdAt}">—</td>
              <td class="time-cell expiry-time" th:attr="data-ts=${url.expiryDate}">—</td>
              <td>
                <span th:if="${url.disabled}"                                                                    class="status-badge disabled">⛔ Disabled</span>
                <span th:if="${!url.disabled and url.scheduledDisableAt != null}"                                class="status-badge pending">⏳ Pending</span>
                <span th:if="${!url.disabled and url.nearingExpiry}"                                             class="status-badge pending">⏰ Expiring</span>
                <span th:if="${!url.disabled and url.scheduledDisableAt == null and !url.nearingExpiry and url.clickCount > 0}"  class="status-badge active">✅ Active</span>
                <span th:if="${!url.disabled and url.scheduledDisableAt == null and !url.nearingExpiry and url.clickCount == 0}" class="status-badge new">🆕 New</span>
              </td>
              <td class="actions-cell">
                <a th:href="@{'/analytics/'+${url.shortCode}}" class="btn-small btn-analytics">Analytics</a>
                <!-- FIX 3: immediately disable, no form submit delay -->
                <form th:if="${url.disabled}" th:action="@{'/enable/'+${url.shortCode}}" method="post" style="display:contents;">
                  <button type="submit" class="btn-small btn-enable">Enable</button>
                </form>
                <form th:unless="${url.disabled}" th:action="@{'/disable/'+${url.shortCode}}"
                      method="post" style="display:contents;">
                  <button type="submit" class="btn-small btn-toggle">Disable</button>
                </form>
                <form th:action="@{'/delete/'+${url.shortCode}}" method="post" style="display:contents;"
                      onsubmit="return confirm('Permanently delete this link?')">
                  <button type="submit" class="btn-small btn-delete">Delete</button>
                </form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(urls)}">
              <td colspan="7" class="empty-message">No links yet. <a href="/home">Create your first →</a></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>
<footer><p>© 2026 TrimURL</p></footer>
<script>
function showToast(msg,type='info',duration=4500){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.animation='toastOut 0.3s ease forwards';setTimeout(()=>t.remove(),300)},duration);
}

// Fix created/expiry timestamps
document.querySelectorAll('.created-time,.expiry-time').forEach(el=>{
  const ts=el.dataset.ts;
  if(!ts||ts==='null'){el.textContent='—';return;}
  el.textContent=new Date(ts).toLocaleString(undefined,{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true});
});

// Page-load toasts from query params
const p=new URLSearchParams(location.search);
// FIX 3: immediate disable notification
if(p.get('disabled'))    showToast('⛔ Link has been disabled immediately.','danger');
if(p.get('enabled'))     showToast('✅ Link has been re-enabled!','success');
if(p.get('pendingDisable'))showToast('⏳ Link scheduled to disable in 1 hour.','warning');
</script>
</body>
</html>

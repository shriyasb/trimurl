<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrimURL - URL Shortener</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <div class="logo">
            <span class="logo-icon">&#128279;</span>
            <span class="logo-text"><span class="bold">TRIM</span><span class="light">URL</span></span>
        </div>
        <nav>
            <a href="/" class="active">Home</a>
            <a href="/dashboard">Dashboard</a>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="hero">
                <h1>Shorten Your Links</h1>
                <p>Create short, memorable URLs in seconds</p>
            </div>

            <div class="card">
                <form id="shortenForm">
                    <div class="form-group">
                        <input type="url" id="originalUrl" name="url" placeholder="Enter your long URL here..." required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="customCode" name="customShortCode" placeholder="Custom short code (optional)">
                    </div>
                    <div class="form-group">
                        <input type="datetime-local" id="expiryDate" name="expiryDate" placeholder="Expiry date (optional)">
                    </div>
                    <button type="submit" class="btn-primary">Shorten URL</button>
                </form>

                <div id="result" class="result hidden">
                    <div class="result-item">
                        <label>Short URL:</label>
                        <div class="copy-group">
                            <input type="text" id="shortUrl" readonly>
                            <button type="button" class="btn-copy" onclick="copyToClipboard()">Copy</button>
                        </div>
                    </div>
                </div>

                <div id="error" class="error hidden"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 TrimURL - URL Shortener Service</p>
    </footer>

    <script>
        document.getElementById('shortenForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const url = document.getElementById('originalUrl').value;
            const customCode = document.getElementById('customCode').value;
            const expiryDate = document.getElementById('expiryDate').value;

            const request = { url: url };
            if (customCode) request.customShortCode = customCode;
            if (expiryDate) request.expiryDate = new Date(expiryDate).toISOString();

            try {
                const response = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('shortUrl').value = data.shortUrl;
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('error').classList.add('hidden');
                } else {
                    document.getElementById('error').textContent = data.error || 'Error creating URL';
                    document.getElementById('error').classList.remove('hidden');
                    document.getElementById('result').classList.add('hidden');
                }
            } catch (err) {
                document.getElementById('error').textContent = 'Network error';
                document.getElementById('error').classList.remove('hidden');
            }
        });

        function copyToClipboard() {
            const copyText = document.getElementById('shortUrl');
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert('Copied to clipboard!');
        }
    </script>
</body>
</html>

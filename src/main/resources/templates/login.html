<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TrimURL</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <div class="logo">
            <span class="logo-icon">&#128279;</span>
            <span class="logo-text"><span class="bold">TRIM</span><span class="light">URL</span></span>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="card auth-card">
                <h1>Welcome Back</h1>
                <p class="subtitle">Sign in to your account</p>

                <div th:if="${param.registered}" class="alert success">
                    Registration successful! Please login.
                </div>
                <div th:if="${param.logout}" class="alert success">
                    You have been logged out.
                </div>
                <div th:if="${error}" class="alert error" th:text="${error}"></div>

                <form th:action="@{/login}" method="post">
                    <div class="form-group">
                        <input type="email" name="username" placeholder="Email address" required>
                    </div>
                    <div class="form-group">
                        <input type="password" name="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-primary">Sign In</button>
                </form>

                <p class="auth-switch">
                    Don't have an account? <a th:href="@{/register}">Register</a>
                </p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 TrimURL - URL Shortener Service</p>
    </footer>
</body>
</html>

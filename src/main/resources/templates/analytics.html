<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Analytics – TrimURL</title>
  <link rel="stylesheet" th:href="@{/css/dashboard.css}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div id="toast-container"></div>
<header>
  <div class="logo"><span class="logo-icon">🔗</span>
    <span class="logo-text"><span class="bold">TRIM</span><span class="light">URL</span></span></div>
  <nav>
    <a href="/home">Home</a>
    <a href="/dashboard" class="active">Dashboard</a>
    <form th:action="@{/logout}" method="post" style="display:inline;">
      <button type="submit" class="btn-logout">Logout</button>
    </form>
  </nav>
</header>
<main>
  <div class="container">
    <a href="/dashboard" class="back-link">← Back to Dashboard</a>
    <div class="page-title">Link Analytics</div>

    <div class="stats-grid" style="margin-bottom:1.5rem;">
      <div class="stat-card">
        <div class="stat-icon">📈</div>
        <div class="stat-info">
          <div class="stat-value" th:text="${url.clickCount}">0</div>
          <div class="stat-label">Total Clicks</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-info">
          <div class="stat-value created-time" th:attr="data-ts=${url.createdAt}" style="font-size:0.88rem;line-height:1.3;">—</div>
          <div class="stat-label">Created</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🕐</div>
        <div class="stat-info">
          <div class="stat-value last-access" th:attr="data-ts=${url.lastAccessed}" style="font-size:0.88rem;line-height:1.3;">Never</div>
          <div class="stat-label">Last Accessed</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" th:text="${url.disabled} ? '⛔' : '✅'">✅</div>
        <div class="stat-info">
          <div class="stat-value" style="font-size:1rem;" th:text="${url.disabled} ? 'Disabled' : 'Active'">Active</div>
          <div class="stat-label">Status</div>
        </div>
      </div>
    </div>

    <div class="section" style="margin-bottom:1.5rem;">
      <h2>URL Details</h2>
      <div style="display:flex;flex-direction:column;gap:1.2rem;padding-top:0.5rem;">
        <div>
          <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-3);margin-bottom:0.5rem;font-weight:700;">Short URL</div>
          <div class="copy-input-wrap">
            <input type="text" th:value="${url.shortUrl}" readonly id="shortUrlInput">
            <button onclick="copyUrl()" class="copy-btn">Copy</button>
          </div>
        </div>
        <div>
          <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-3);margin-bottom:0.5rem;font-weight:700;">Original URL</div>
          <a th:href="${url.originalUrl}" th:text="${url.originalUrl}" target="_blank"
             style="color:var(--purple);word-break:break-all;font-size:0.85rem;"></a>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Clicks Over Time</h2>
      <div style="padding-top:1rem;">
        <canvas id="clicksChart" style="max-height:340px;"></canvas>
        <p th:if="${stats == null or #maps.isEmpty(stats)}"
           style="text-align:center;color:var(--text-3);padding:2rem 0;">No click data yet.</p>
      </div>
    </div>
  </div>
</main>
<footer><p>© 2026 TrimURL — Shorten smarter.</p></footer>
<script th:inline="javascript">
const stats = /*[[${stats}]]*/ {};
const labels = Object.keys(stats);
const data   = Object.values(stats);

if (labels.length > 0) {
  const ctx = document.getElementById('clicksChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Clicks',
        data,
        borderColor: '#fb923c',
        backgroundColor: 'rgba(251,146,60,0.07)',
        pointBackgroundColor: '#c084fc',
        pointBorderColor: '#fb923c',
        pointRadius: 5,
        pointHoverRadius: 7,
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: '#8888a8', font: { family: 'DM Sans', size: 13 } } }
      },
      scales: {
        x: { ticks: { color: '#44445a' }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { beginAtZero: true, ticks: { color: '#44445a', stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });
}

function showToast(msg,type='info'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.animation='toastOut 0.3s ease forwards';setTimeout(()=>t.remove(),300)},3500);
}
function copyUrl(){
  const i=document.getElementById('shortUrlInput');i.select();
  navigator.clipboard.writeText(i.value).catch(()=>document.execCommand('copy'));
  showToast('📋 Short URL copied!','success');
}
// Fix timestamps
document.querySelectorAll('.created-time,.last-access').forEach(el=>{
  const ts=el.dataset.ts; if(!ts) return;
  el.textContent=new Date(ts).toLocaleString(undefined,{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true});
});
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin Panel – TrimURL</title>
  <link rel="stylesheet" th:href="@{/css/dashboard.css}">
  <style>
    .user-name-cell { display:flex; align-items:center; gap:0.5rem; }
    .section-actions { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
  </style>
</head>
<body>
<div id="toast-container"></div>
<header>
  <div class="logo">
    <span class="logo-icon">🔗</span>
    <span class="logo-text"><span class="bold">TRIM</span><span class="light">URL</span></span>
    <span class="admin-badge">ADMIN</span>
  </div>
  <nav>
    <a href="/admin" class="active">Admin Panel</a>
    <form th:action="@{/logout}" method="post" style="display:inline;">
      <button type="submit" class="btn-logout">Logout</button>
    </form>
  </nav>
</header>
<main>
  <div class="container" style="max-width:1200px;">
    <div class="page-title">Admin Panel</div>

    <!-- Overview Stats -->
    <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:2rem;">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-info">
          <div class="stat-value" th:text="${totalUsers}">0</div>
          <div class="stat-label">Total Users</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔗</div>
        <div class="stat-info">
          <div class="stat-value" th:text="${totalLinks}">0</div>
          <div class="stat-label">Total Links</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📈</div>
        <div class="stat-info">
          <div class="stat-value" th:text="${totalClicks}">0</div>
          <div class="stat-label">Total Clicks</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🚫</div>
        <div class="stat-info">
          <div class="stat-value" th:text="${disabledUsers}">0</div>
          <div class="stat-label">Disabled Accounts</div>
        </div>
      </div>
    </div>

    <!-- Users Table -->
    <div class="section">
      <h2>All Users</h2>
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>User</th><th>Email</th><th>Role</th>
              <th>Links</th><th>Clicks</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="user : ${users}" th:classappend="${user.accountDisabled} ? 'account-disabled'">
              <td>
                <div class="user-name-cell">
                  <span class="user-avatar" th:text="${#strings.toUpperCase(#strings.substring(user.name,0,1))}">U</span>
                  <span th:text="${user.name}">Name</span>
                </div>
              </td>
              <td style="color:var(--text-2);font-size:0.84rem;" th:text="${user.email}">email</td>
              <td>
                <span class="role-pill" th:classappend="${user.role == 'ADMIN'} ? 'admin' : 'user'" th:text="${user.role}">USER</span>
              </td>
              <td style="font-weight:600;" th:text="${userLinkCounts[user.id] ?: 0}">0</td>
              <td style="color:var(--text-2);" th:text="${userClickCounts[user.id] ?: 0}">0</td>
              <td>
                <span th:if="${user.accountDisabled}"  class="status-badge disabled">⛔ Disabled</span>
                <span th:unless="${user.accountDisabled}" class="status-badge active">✅ Active</span>
              </td>
              <td class="actions-cell">
                <a th:href="@{'/admin/user/'+${user.id}}" class="btn-small btn-view">View Links</a>
                <form th:unless="${user.accountDisabled}"
                      th:action="@{'/admin/disable-user/'+${user.id}}" method="post" style="display:contents;"
                      onsubmit="return confirm('Disable this user account? They will not be able to log in.')">
                  <button type="submit" class="btn-small btn-toggle">Disable</button>
                </form>
                <form th:if="${user.accountDisabled}"
                      th:action="@{'/admin/enable-user/'+${user.id}}" method="post" style="display:contents;">
                  <button type="submit" class="btn-small btn-enable">Enable</button>
                </form>
                <form th:action="@{'/admin/delete-user/'+${user.id}}" method="post" style="display:contents;"
                      onsubmit="return confirm('Permanently delete this user and ALL their links? This cannot be undone.')">
                  <button type="submit" class="btn-small btn-delete">Delete</button>
                </form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
              <td colspan="7" class="empty-message">No users found.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>
<footer><p>© 2026 TrimURL — Admin Panel</p></footer>
<script>
function showToast(msg,type='info'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.animation='toastOut 0.3s ease forwards';setTimeout(()=>t.remove(),300)},4000);
}
const p=new URLSearchParams(location.search);
if(p.get('deleted'))showToast('🗑️ User deleted successfully.','warning');
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Register – TrimURL</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
  <div class="logo"><span class="logo-icon">🔗</span>
    <span class="logo-text"><span class="bold">TRIM</span><span class="light">URL</span></span></div>
</header>
<main>
  <div class="container">
    <div class="hero"><h1>Create Account</h1><p>Start shortening and tracking URLs for free</p></div>
    <div class="card">
      <div th:if="${error}" class="alert error" th:text="${error}"></div>
      <form th:action="@{/register}" method="post" id="regForm">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" placeholder="Ada Lovelace" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" id="pw" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="confirmPassword" id="cpw" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label class="form-label">Account Type</label>
          <div class="role-select-wrapper" id="roleWrap">
            <label class="role-option selected" id="optUser">
              <input type="radio" name="role" value="USER" checked>
              <span class="role-icon">👤</span>User
            </label>
            <label class="role-option" id="optAdmin">
              <input type="radio" name="role" value="ADMIN">
              <span class="role-icon">🛡️</span>Admin
            </label>
          </div>
        </div>
        <button type="submit" class="btn-primary">Create Account →</button>
      </form>
      <p class="auth-switch">Already have an account? <a th:href="@{/login}">Sign In</a></p>
    </div>
  </div>
</main>
<footer><p>© 2026 TrimURL — Shorten smarter.</p></footer>
<script>
document.querySelectorAll('.role-option').forEach(opt=>{
  opt.addEventListener('click',()=>{
    document.querySelectorAll('.role-option').forEach(o=>{o.classList.remove('selected','selected-admin');});
    const isAdmin=opt.querySelector('input').value==='ADMIN';
    opt.classList.add(isAdmin?'selected-admin':'selected');
  });
});
document.getElementById('regForm').addEventListener('submit',e=>{
  if(document.getElementById('pw').value!==document.getElementById('cpw').value){
    e.preventDefault();alert('Passwords do not match!');
  }
});
</script>
</body>
</html>

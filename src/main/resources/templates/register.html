<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Register – TrimURL</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
  <div class="logo">
    <span class="logo-icon">🔗</span>
    <span class="logo-text"><span class="bold">TRIM</span><span class="light">URL</span></span>
  </div>
</header>
<main>
  <div class="container">
    <div class="hero">
      <h1>Create <span>Account</span></h1>
      <p>Start shortening and tracking URLs for free</p>
    </div>
    <div class="card">
      <div th:if="${error}" class="alert error" th:text="${error}"></div>
      <form th:action="@{/register}" method="post" id="regForm">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" id="pw" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="confirmPassword" id="cpw" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary">Create Account</button>
      </form>
      <p class="auth-switch">Already have an account? <a th:href="@{/login}">Sign In</a></p>
    </div>
  </div>
</main>
<footer><p>© 2026 TrimURL</p></footer>
<script>
document.getElementById('regForm').addEventListener('submit',e=>{
  if(document.getElementById('pw').value!==document.getElementById('cpw').value){
    e.preventDefault();alert('Passwords do not match!');
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>User Detail – TrimURL Admin</title>
  <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div id="toast-container"></div>
<header>
  <div class="logo">
    <span class="logo-icon">🔗</span>
    <span class="logo-text"><span class="bold">TRIM</span><span class="light">URL</span></span>
    <span class="admin-badge">ADMIN</span>
  </div>
  <nav>
    <a href="/admin">Admin Panel</a>
    <form th:action="@{/logout}" method="post" style="display:inline;">
      <button type="submit" class="btn-logout">Logout</button>
    </form>
  </nav>
</header>
<main>
  <div class="container" style="max-width:1100px;">
    <a href="/admin" class="back-link">← Back to Admin Panel</a>
    <div class="page-title">User Detail</div>

    <div class="user-header" th:if="${targetUser != null}">
      <div class="user-avatar-lg" th:text="${#strings.toUpperCase(#strings.substring(targetUser.name,0,1))}">U</div>
      <div class="user-meta">
        <h2 th:text="${targetUser.name}">Name</h2>
        <p th:text="${targetUser.email}">email</p>
        <p style="margin-top:0.5rem;display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
          <span>Role:</span>
          <span class="role-pill" th:classappend="${targetUser.role == 'ADMIN'} ? 'admin' : 'user'" th:text="${targetUser.role}">USER</span>
          <span>Status:</span>
          <span th:if="${targetUser.accountDisabled}"  class="status-badge disabled" style="font-size:0.7rem;">⛔ Disabled</span>
          <span th:unless="${targetUser.accountDisabled}" class="status-badge active" style="font-size:0.7rem;">✅ Active</span>
        </p>
      </div>
    </div>

    <div class="section">
      <h2>Links by this User (<span th:text="${#lists.size(links)}">0</span>)</h2>
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>Short Code</th><th>Original URL</th><th>Clicks</th>
              <th>Created</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="link : ${links}">
              <td style="color:var(--orange);font-weight:700;font-size:0.85rem;" th:text="${link.shortCode}">code</td>
              <td class="truncate" th:text="${link.originalUrl}">url</td>
              <td th:text="${link.totalClicks}">0</td>
              <td class="time-cell created-time" th:attr="data-ts=${link.createdAt}">—</td>
              <td>
                <span th:if="${link.disabled}"  class="status-badge disabled">⛔ Disabled</span>
                <span th:unless="${link.disabled}" class="status-badge active">✅ Active</span>
              </td>
              <td class="actions-cell">
                <form th:unless="${link.disabled}"
                      th:action="@{'/admin/disable-link/'+${link.shortCode}}" method="post" style="display:contents;">
                  <input type="hidden" name="returnUserId" th:value="${targetUser.id}">
                  <button type="submit" class="btn-small btn-toggle">Disable</button>
                </form>
                <form th:if="${link.disabled}"
                      th:action="@{'/admin/enable-link/'+${link.shortCode}}" method="post" style="display:contents;">
                  <input type="hidden" name="returnUserId" th:value="${targetUser.id}">
                  <button type="submit" class="btn-small btn-enable">Enable</button>
                </form>
                <form th:action="@{'/admin/delete-link/'+${link.shortCode}}" method="post" style="display:contents;"
                      onsubmit="return confirm('Delete this link permanently?')">
                  <input type="hidden" name="returnUserId" th:value="${targetUser.id}">
                  <button type="submit" class="btn-small btn-delete">Delete</button>
                </form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(links)}">
              <td colspan="6" class="empty-message">This user has no links yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>
<footer><p>© 2026 TrimURL — Admin Panel</p></footer>
<script>
document.querySelectorAll('.created-time').forEach(el=>{
  const ts=el.dataset.ts; if(!ts) return;
  el.textContent=new Date(ts).toLocaleString(undefined,{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true});
});
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrimURL - URL Shortener</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <div class="logo">
            <span class="logo-icon">&#128279;</span>
            <span class="logo-text"><span class="bold">TRIM</span><span class="light">URL</span></span>
        </div>
        <nav>
            <a href="/home" class="active">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/test">Test</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="hero">
                <h1>Shorten Your Links</h1>
                <p>Create short, memorable URLs in seconds</p>
            </div>

            <div class="card">
                <div th:if="${error}" class="alert error" th:text="${error}"></div>
                <div th:if="${shortUrl}" class="alert success">
                    <p>URL Shortened Successfully!</p>
                    <div class="copy-group">
                        <input type="text" th:value="${shortUrl}" readonly id="shortUrlInput">
                        <button type="button" class="btn-copy" onclick="copyToClipboard()">Copy</button>
                    </div>
                </div>

                <form th:action="@{/shorten}" method="post">
                    <div class="form-group">
                        <label class="form-label">Enter Long URL</label>
                        <input type="url" name="url" placeholder="https://example.com/very-long-url..." required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Custom Short Code (Optional)</label>
                        <input type="text" name="customShortCode" placeholder="e.g., mylink">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Expiry Date (Optional)</label>
                        <input type="datetime-local" name="expiryDateStr" placeholder="Leave empty for no expiry">
                        <small class="form-hint">Link will stop working after this date</small>
                    </div>
                    <button type="submit" class="btn-primary">Shorten URL</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 TrimURL - URL Shortener Service</p>
    </footer>

    <script>
        function copyToClipboard() {
            const input = document.getElementById('shortUrlInput');
            input.select();
            navigator.clipboard.writeText(input.value);
            alert('Copied to clipboard!');
        }
    </script>
</body>
</html>

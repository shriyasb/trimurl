<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>TrimURL – Shorten</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div id="toast-container"></div>
<header>
  <div class="logo"><span class="logo-icon">🔗</span>
    <span class="logo-text"><span class="bold">TRIM</span><span class="light">URL</span></span></div>
  <nav>
    <a href="/home" class="active">Home</a>
    <a href="/dashboard">Dashboard</a>
    <form th:action="@{/logout}" method="post" style="display:inline;">
      <button type="submit" class="btn-logout">Logout</button>
    </form>
  </nav>
</header>
<main>
  <div class="container">
    <div class="hero">
      <h1>Shorten Your Links</h1>
      <p>Paste, verify security, and get a crisp short URL instantly</p>
    </div>
    <div class="card">
      <div th:if="${error}"    class="alert error"   th:text="${error}"></div>
      <div th:if="${shortUrl}" class="alert success">
        <p style="font-weight:700;margin-bottom:0.5rem;">✅ Shortened successfully!</p>
        <div class="copy-group">
          <input type="text" th:value="${shortUrl}" readonly id="shortUrlInput">
          <button type="button" class="btn-copy" onclick="copyUrl()">Copy</button>
        </div>
      </div>
      <form th:action="@{/shorten}" method="post" id="shortenForm">
        <div class="form-group">
          <label class="form-label">Long URL</label>
          <div class="url-input-row">
            <input type="url" name="url" id="urlInput" placeholder="https://example.com/very-long-url..." required>
            <button type="button" class="btn-check" onclick="checkSecurity()">🔍 Check Security</button>
          </div>
          <div id="securityResult" class="security-badge hidden"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Custom Short Code <span style="color:var(--text-3);font-weight:400;text-transform:none;">(optional)</span></label>
          <input type="text" name="customShortCode" placeholder="e.g., mylink">
        </div>
        <div class="form-group">
          <label class="form-label">Expiry Date <span style="color:var(--text-3);font-weight:400;text-transform:none;">(optional)</span></label>
          <input type="datetime-local" name="expiryDateStr">
          <small class="form-hint">Link stops working after this date</small>
        </div>
        <button type="submit" class="btn-primary" id="shortenBtn" disabled>✂️ Shorten URL</button>
        <p style="text-align:center;color:var(--text-3);font-size:0.78rem;margin-top:0.7rem;">Security check required before shortening</p>
      </form>
    </div>
  </div>
</main>
<footer><p>© 2026 TrimURL — Shorten smarter.</p></footer>
<script>
function showToast(msg,type='info'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.animation='toastOut 0.3s ease forwards';setTimeout(()=>t.remove(),300)},4200);
}
function copyUrl(){
  const i=document.getElementById('shortUrlInput');i.select();
  navigator.clipboard.writeText(i.value).catch(()=>document.execCommand('copy'));
  showToast('📋 Copied to clipboard!','success');
}
let secOk=false;
async function checkSecurity(){
  const url=document.getElementById('urlInput').value.trim();
  const badge=document.getElementById('securityResult');
  const btn=document.getElementById('shortenBtn');
  if(!url){badge.textContent='⚠️ Please enter a URL first';badge.className='security-badge warning';return;}
  badge.textContent='🔄 Checking security…';badge.className='security-badge info';
  try{
    const res=await fetch('/api/check-url',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
    const d=await res.json();
    badge.textContent=d.message;badge.className='security-badge '+(d.secure?'success':'danger');
    secOk=d.secure;btn.disabled=!d.secure;
    showToast(d.message,d.secure?'success':'danger');
  }catch(e){
    badge.textContent='❌ Could not verify. Try again.';badge.className='security-badge danger';
    secOk=false;btn.disabled=true;
  }
}
document.getElementById('urlInput').addEventListener('input',()=>{
  if(secOk){secOk=false;document.getElementById('shortenBtn').disabled=true;document.getElementById('securityResult').className='security-badge hidden';}
});
</script>
</body>
</html>

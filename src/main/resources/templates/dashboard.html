<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TrimURL</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <header>
        <div class="logo">
            <span class="logo-icon">&#128279;</span>
            <span class="logo-text"><span class="bold">TRIM</span><span class="light">URL</span></span>
        </div>
        <nav>
            <a href="/home">Home</a>
            <a href="/dashboard" class="active">Dashboard</a>
            <a href="/test">Test</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Your Dashboard</h1>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">&#128279;</div>
                    <div class="stat-info">
                        <span class="stat-value" th:text="${totalUrls}">0</span>
                        <span class="stat-label">Total URLs</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">&#128200;</div>
                    <div class="stat-info">
                        <span class="stat-value" th:text="${totalClicks}">0</span>
                        <span class="stat-label">Total Clicks</span>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>All Your Links</h2>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Short URL</th>
                                <th>Original URL</th>
                                <th>Clicks</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="url : ${urls}">
                                <td><a th:href="@{'/r/' + ${url.shortCode}}" th:text="${url.shortUrl}" target="_blank"></a></td>
                                <td class="truncate" th:text="${url.originalUrl}"></td>
                                <td th:text="${url.clickCount}">0</td>
                                <td>
                                    <span th:if="${url.clickCount > 0}" class="status-badge active">Active</span>
                                    <span th:unless="${url.clickCount > 0}" class="status-badge new">New</span>
                                </td>
                                <td class="actions-cell">
                                    <a th:href="@{'/analytics/' + ${url.shortCode}}" class="btn-small">Analytics</a>
                                    <form th:action="@{'/toggle/' + ${url.shortCode}}" method="post" style="display:inline;">
                                        <button type="submit" class="btn-small btn-toggle" onclick="return confirm('Disable this link?')">Disable</button>
                                    </form>
                                    <form th:action="@{'/delete/' + ${url.shortCode}}" method="post" style="display:inline;" onsubmit="return confirm('Delete this link permanently?')">
                                        <button type="submit" class="btn-small btn-delete">Delete</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(urls)}">
                                <td colspan="5" class="empty-message">No URLs yet. Create your first short URL!</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 TrimURL - URL Shortener Service</p>
    </footer>

    <script th:if="${param.disabled}">
        alert('Link has been disabled');
    </script>
</body>
</html>

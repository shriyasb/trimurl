<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Links - TrimURL</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .test-subtitle {
            color: white !important;
            font-size: 1.2rem !important;
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .test-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem;
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 0.75rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .test-link-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            flex: 1;
            min-width: 200px;
        }
        .short-link {
            font-weight: 700;
            color: #2563eb;
            font-size: 1rem;
        }
        .original-link {
            font-size: 0.8rem;
            color: #64748b;
            max-width: 400px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <span class="logo-icon">&#128279;</span>
            <span class="logo-text"><span class="bold">TRIM</span><span class="light">URL</span></span>
        </div>
        <nav>
            <a href="/home">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/test" class="active">Test</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Test Your Links</h1>
            <p class="test-subtitle">Click your short links below to simulate traffic and track analytics.</p>

            <div class="section">
                <h2>Your Short Links</h2>
                <div class="test-links">
                    <div class="test-link" th:each="url : ${urls}">
                        <div class="test-link-info">
                            <span class="short-link" th:text="${url.shortUrl}"></span>
                            <span class="original-link" th:text="${url.originalUrl}"></span>
                        </div>
                        <a th:href="@{'/r/' + ${url.shortCode}}" target="_blank" class="btn-test">
                            Open Link
                        </a>
                    </div>
                    <div th:if="${#lists.isEmpty(urls)}" class="empty-message">
                        No URLs yet. Create your first short URL!
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>Manual Test</h2>
                <p style="color: #64748b; margin-bottom: 1rem;">Enter short code to test:</p>
                <form id="manualTestForm" class="test-form">
                    <input type="text" id="shortCodeInput" placeholder="Enter short code (e.g., abc12345)" required>
                    <button type="submit" class="btn-primary">Test</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 TrimURL - URL Shortener Service</p>
    </footer>

    <script>
        document.getElementById('manualTestForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var code = document.getElementById('shortCodeInput').value.trim();
            if (code) {
                window.location.href = '/r/' + code;
            }
        });
    </script>
</body>
</html>

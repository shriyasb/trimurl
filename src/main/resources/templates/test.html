<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Test – TrimURL</title>
  <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<header>
  <div class="logo"><span class="logo-icon">🔗</span>
    <span class="logo-text"><span class="bold">TRIM</span><span class="light">URL</span></span></div>
  <nav>
    <a href="/home">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/test" class="active">Test</a>
    <form th:action="@{/logout}" method="post" style="display:inline;">
      <button type="submit" class="btn-logout">Logout</button>
    </form>
  </nav>
</header>
<main>
  <div class="container">
    <div class="page-title">Test Page</div>
    <div class="section">
      <h2>Your URLs</h2>
      <div id="urlList">
        <div th:each="url : ${urls}" style="padding:0.8rem 0;border-bottom:1px solid var(--border);">
          <span style="color:var(--orange);font-weight:700;" th:text="${url.shortCode}">code</span>
          <span style="color:var(--text-2);margin-left:1rem;font-size:0.85rem;" th:text="${url.originalUrl}">url</span>
        </div>
        <p th:if="${#lists.isEmpty(urls)}" style="color:var(--text-3);text-align:center;padding:2rem;">No URLs yet.</p>
      </div>
    </div>
  </div>
</main>
<footer><p>© 2026 TrimURL</p></footer>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Links - TrimURL</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <header>
        <div class="logo">
            <span class="logo-icon">&#128279;</span>
            <span class="logo-text"><span class="bold">TRIM</span><span class="light">URL</span></span>
        </div>
        <nav>
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/test" class="active">Test</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Test Your Links</h1>
            <p class="subtitle">Click your short links below to simulate traffic and track analytics.</p>

            <div class="section">
                <h2>Your Short Links</h2>
                <div class="test-links">
                    <div class="test-link" th:each="url : ${urls}">
                        <div class="test-link-info">
                            <span class="short-link" th:text="${url.shortUrl}"></span>
                            <span class="original-link" th:text="${url.originalUrl}"></span>
                        </div>
                        <a th:href="@{'/r/' + ${url.shortCode}}" target="_blank" class="btn-test">
                            Open Link
                        </a>
                    </div>
                    <div th:if="${#lists.isEmpty(urls)}" class="empty-message">
                        No URLs yet. Create your first short URL!
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>Manual Test</h2>
                <p>Enter short code or full short URL:</p>
                <form id="manualTestForm" class="test-form">
                    <input type="text" id="shortCodeInput" placeholder="e.g., abc123 or https://trimurl.onrender.com/r/abc123" required>
                    <button type="submit" class="btn-primary">Test</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 TrimURL - URL Shortener Service</p>
    </footer>

    <script>
        document.getElementById('manualTestForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var input = document.getElementById('shortCodeInput').value.trim();

            // Extract short code from full URL if user pasted full URL
            var shortCode = input;
            if (input.includes('/r/')) {
                shortCode = input.split('/r/')[1];
            } else if (input.includes(' trimurl.onrender.com/')) {
                shortCode = input.split(' trimurl.onrender.com/')[1];
            }

            window.location.href = '/r/' + shortCode;
        });
    </script>
</body>
</html>
